name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package release build
        run: |
          Scripts/package-app.sh release "${{ steps.version.outputs.version }}" .build/IPTV.app

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent .build/IPTV.app "IPTV-${{ steps.version.outputs.version }}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: IPTV-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
